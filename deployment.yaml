apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthcare-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: healthcare
  template:
    metadata:
      labels:
        app: healthcare
    spec:
      containers:
      - name: app
        image: healthcare-app:latest
        imagePullPolicy: Never 
        ports:
        - containerPort: 3000
        env:
        # SECURITY RULE: Inject the password securely from the Secret!
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: password
---
apiVersion: v1
kind: Service
metadata:
  name: healthcare-service
spec:
  type: NodePort
  selector:
    app: healthcare
  ports:
    - port: 80
      targetPort: 3000
      nodePort: 30080
